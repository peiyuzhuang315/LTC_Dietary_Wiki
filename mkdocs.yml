site_name: 長照膳食實戰百科：從營運到臨床的全維度指南
site_description: 台灣長照膳食產業本地端知識庫，涵蓋經營、臨床、認證、政策、業者 130+ 詞條
site_author: Mandala知識庫
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-7
        name: 切換為深色模式
    - scheme: slate
      primary: teal
      accent: orange
      toggle:
        icon: material/brightness-4
        name: 切換為亮色模式
  font:
    text: Noto Sans TC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.tooltips
    - toc.integrate

plugins:
  - search:
      lang: zh
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - def_list
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/solid/book
      link: https://github.com/peiyuzhuang315/LTC_Dietary_Wiki
      name: Mandala知識庫

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/ai_chat_widget.js
  - javascripts/auto_link_terms.js

