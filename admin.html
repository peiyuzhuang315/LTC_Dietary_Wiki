<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌱 知識飛輪管理後台 — 長照膳食實戰百科</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #7d8590; --accent: #238636;
  --accent-hover: #2ea043; --teal: #00897b; --teal-dark: #00695c;
  --blue: #388bfd; --orange: #e3b341;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.6;
}

/* ── TOP BAR ── */
.topbar {
  background: linear-gradient(90deg, var(--teal), #0097a7);
  padding: 1rem 2rem; display: flex; align-items: center;
  gap: 1rem; box-shadow: 0 2px 16px rgba(0,0,0,.5);
  position: sticky; top: 0; z-index: 100;
}
.topbar-title { font-size: 1.15rem; font-weight: 800; color: #fff; }
.topbar-sub { font-size: .78rem; opacity: .75; color: #fff; }
.topbar-right { margin-left: auto; display: flex; gap: .5rem; align-items: center; }
.back-link { color: rgba(255,255,255,.8); text-decoration: none; font-size: .82rem; }
.back-link:hover { color: #fff; }

/* ── TABS ── */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 2rem; }
.tab-btn {
  padding: .9rem 1.5rem; font-size: .88rem; font-weight: 600;
  background: none; border: none; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--teal); border-bottom-color: var(--teal); }

/* ── BODY ── */
.body { padding: 1.5rem 2rem; max-width: 1100px; margin: 0 auto; }

/* ── SECTION HEADER ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.2rem;
}
.section-header h2 { font-size: 1rem; font-weight: 700; }

/* ── BUTTONS ── */
.btn {
  padding: .4rem 1rem; border-radius: 6px; border: 1px solid var(--border);
  cursor: pointer; font-size: .82rem; font-weight: 600;
  font-family: inherit; transition: all .2s; display: inline-flex; align-items: center; gap: .3rem;
}
.btn-green { background: var(--accent); color: #fff; border-color: var(--accent-hover); }
.btn-green:hover { background: var(--accent-hover); }
.btn-teal { background: var(--teal); color: #fff; border-color: var(--teal-dark); }
.btn-teal:hover { background: var(--teal-dark); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { background: var(--card); color: var(--text); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

/* ── GAP ROW ── */
.gap-row {
  display: flex; align-items: center; gap: 1rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: .85rem 1.2rem; margin-bottom: .6rem;
  transition: border-color .2s;
}
.gap-row:hover { border-color: var(--teal); }
.gap-count {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--teal); color: #fff; font-weight: 800;
  font-size: .9rem; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.gap-term { font-weight: 700; font-size: .9rem; flex: 1; }
.gap-q { font-size: .78rem; color: var(--muted); flex: 2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gap-actions { flex-shrink: 0; }

/* ── DRAFT CARD ── */
.draft-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: .8rem; overflow: hidden;
  transition: border-color .2s;
}
.draft-card:hover { border-color: #388bfd55; }
.draft-card-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 1rem; padding: 1rem 1.2rem; flex-wrap: wrap;
}
.draft-term { font-weight: 700; font-size: .95rem; }
.draft-meta { font-size: .75rem; color: var(--muted); margin-top: .2rem; }
.draft-actions { display: flex; gap: .5rem; flex-shrink: 0; flex-wrap: wrap; }
.draft-body {
  padding: 1rem 1.2rem; border-top: 1px solid var(--border);
  display: none; background: #0d1117;
}
.draft-body pre {
  font-size: .78rem; line-height: 1.8; white-space: pre-wrap;
  color: #94a3b8; max-height: 280px; overflow-y: auto;
}

/* ── BADGES ── */
.badge {
  display: inline-block; padding: .15rem .55rem; border-radius: 20px;
  font-size: .72rem; font-weight: 700;
}
.badge-blue { background: #1e3a8a44; color: #93c5fd; border: 1px solid #3b82f644; }
.badge-green { background: #14532d44; color: #4ade80; border: 1px solid #22c55e44; }
.badge-yellow { background: #78350f44; color: #fbbf24; border: 1px solid #f59e0b44; }
.badge-gray { background: #1e293b; color: #64748b; border: 1px solid #334155; }

/* ── FILTER ── */
.filter-select {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: .4rem .8rem; border-radius: 6px; font-size: .82rem; font-family: inherit;
}

/* ── EMPTY / LOADING ── */
.empty { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, #1e293b 50%, var(--card) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
  border-radius: 8px; height: 60px; margin-bottom: .6rem;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border); border-radius: 50px;
  padding: .7rem 1.5rem; font-size: .85rem; z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,.5); display: none;
  max-width: 90vw; text-align: center;
}

/* ── SPINNER ── */
.spin {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── STAT STRIP ── */
.stat-strip { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
.stat {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: .8rem 1.2rem; flex: 1; min-width: 130px;
}
.stat-value { font-size: 1.8rem; font-weight: 800; line-height: 1; }
.stat-label { font-size: .75rem; color: var(--muted); margin-top: .3rem; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">🌱 知識飛輪管理後台</div>
    <div class="topbar-sub">長照膳食實戰百科 · 全自動內容成長系統</div>
  </div>
  <div class="topbar-right">
    <a class="back-link" href="/LTC_Dietary_Wiki/">← 返回知識庫</a>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('gaps')">📡 知識缺口</button>
  <button class="tab-btn" onclick="switchTab('drafts')">✍️ 草稿審核</button>
</div>

<div class="body">

  <!-- Tab 1: 知識缺口 -->
  <div id="tab-gaps" class="tab-panel active">
    <div style="margin-bottom:1.2rem;" id="gap-stats"></div>
    <div class="section-header">
      <h2>缺口詞條排行榜</h2>
      <button class="btn btn-ghost" onclick="loadGaps()">🔄 重整</button>
    </div>
    <div id="gaps-list">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>

  <!-- Tab 2: 草稿審核 -->
  <div id="tab-drafts" class="tab-panel">
    <div class="section-header">
      <h2>草稿審核區</h2>
      <div style="display:flex;gap:.5rem;align-items:center;">
        <select class="filter-select" id="draft-filter" onchange="loadDrafts()">
          <option value="🤖 AI草稿">🤖 AI草稿</option>
          <option value="✅ 核准發布">✅ 核准發布</option>
          <option value="📦 已發布">📦 已發布</option>
          <option value="all">全部</option>
        </select>
        <button class="btn btn-ghost" onclick="loadDrafts()">🔄 重整</button>
      </div>
    </div>
    <div id="drafts-list">
      <div class="skeleton"></div><div class="skeleton"></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
const WORKER = "https://ltc-wiki-worker.peiyuzhuang.workers.dev";

// ── Tab 切換 ──────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['gaps','drafts'][i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'gaps') loadGaps();
  if (tab === 'drafts') loadDrafts();
}

// ── Toast 提示 ────────────────────────────────────
let toastTimer;
function toast(msg, duration = 4000) {
  const el = document.getElementById('toast');
  el.innerHTML = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  if (duration > 0) toastTimer = setTimeout(() => el.style.display = 'none', duration);
}

// ── 知識缺口 ──────────────────────────────────────
async function loadGaps() {
  const list = document.getElementById('gaps-list');
  const stats = document.getElementById('gap-stats');
  list.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
  try {
    const res = await fetch(`${WORKER}/admin/gaps`);
    const { gaps } = await res.json();

    // 統計列
    const total = (gaps || []).reduce((s, g) => s + g.count, 0);
    stats.innerHTML = `
      <div class="stat-strip">
        <div class="stat"><div class="stat-value" style="color:var(--teal)">${(gaps||[]).length}</div><div class="stat-label">缺口詞條數量</div></div>
        <div class="stat"><div class="stat-value" style="color:var(--blue)">${total}</div><div class="stat-label">累計觸發次數</div></div>
      </div>`;

    if (!gaps || gaps.length === 0) {
      list.innerHTML = '<div class="empty">🎉 目前沒有知識缺口！</div>';
      return;
    }
    list.innerHTML = gaps.map(g => `
      <div class="gap-row" id="gap-${esc(g.term)}">
        <div class="gap-count">${g.count}</div>
        <div class="gap-term">${g.term}</div>
        <div class="gap-q">${g.question || '—'}</div>
        <div class="gap-actions">
          <button class="btn btn-teal" id="gbtn-${esc(g.term)}"
            onclick="generateDraft('${esc(g.term)}','${esc(g.question)}',this)">
            🤖 生成草稿
          </button>
        </div>
      </div>`).join('');
  } catch (e) {
    list.innerHTML = `<div class="empty">❌ 載入失敗：${e.message}</div>`;
  }
}

// ── 生成草稿 ──────────────────────────────────────
async function generateDraft(term, question, btn) {
  if (!confirm(`確定要為「${term}」生成 AI 草稿？\n（需要 20-40 秒，生成完成後到「✍️ 草稿審核」Tab 查看）`)) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> AI 撰寫中...';
  toast('⏳ AI 正在撰寫草稿，請稍候...', 0);
  try {
    const res = await fetch(`${WORKER}/admin/draft`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ term, question })
    });
    const data = await res.json();
    if (data.success) {
      toast(`✅ 草稿完成！共 ${data.chars} 字。切換到「✍️ 草稿審核」查看。`);
      btn.innerHTML = '✅ 已生成';
      btn.style.background = '#14532d';
    } else {
      throw new Error(data.error || '未知錯誤');
    }
  } catch (e) {
    toast(`❌ 生成失敗：${e.message}`);
    btn.innerHTML = orig; btn.disabled = false;
  }
}

// ── 草稿列表 ──────────────────────────────────────
async function loadDrafts() {
  const list = document.getElementById('drafts-list');
  const status = document.getElementById('draft-filter').value;
  list.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
  try {
    const res = await fetch(`${WORKER}/admin/drafts?status=${encodeURIComponent(status)}`);
    const { drafts } = await res.json();
    if (!drafts || drafts.length === 0) {
      list.innerHTML = '<div class="empty">此狀態目前沒有草稿</div>'; return;
    }
    list.innerHTML = drafts.map(d => `
      <div class="draft-card" id="dc-${d.id}">
        <div class="draft-card-header">
          <div>
            <div class="draft-term">📄 ${d.term}</div>
            <div class="draft-meta">
              ${new Date(d.createdTime).toLocaleString('zh-TW')} ·
              ${d.content.length} 字 ·
              <span class="badge ${badgeClass(d.status)}">${d.status}</span>
            </div>
          </div>
          <div class="draft-actions">
            <button class="btn btn-ghost" onclick="toggleBody('${d.id}')">👁 展開</button>
            ${d.status !== '📦 已發布'
              ? `<button class="btn btn-green" onclick='publishDraft("${d.id}","${esc(d.term)}",${JSON.stringify(d.content)},this)'>🚀 核准並發布</button>`
              : '<span class="badge badge-green">📦 已上線</span>'}
          </div>
        </div>
        <div class="draft-body" id="db-${d.id}">
          <pre>${escHtml(d.content)}</pre>
        </div>
      </div>`).join('');
  } catch (e) {
    list.innerHTML = `<div class="empty">❌ ${e.message}</div>`;
  }
}

function toggleBody(id) {
  const el = document.getElementById('db-' + id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function badgeClass(s) {
  if (s.includes('草稿') || s.includes('審核')) return 'badge-blue';
  if (s.includes('已發布')) return 'badge-green';
  if (s.includes('核准')) return 'badge-yellow';
  return 'badge-gray';
}

// ── 發布 ──────────────────────────────────────────
async function publishDraft(pageId, term, content, btn) {
  if (!confirm(`確定要發布「${term}」？\n文章將透過 GitHub API 直接上傳，約 2 分鐘後上線。`)) return;
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 發布中...';
  toast('🚀 透過 GitHub API 發布中...', 0);
  try {
    const res = await fetch(`${WORKER}/admin/publish`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pageId, term, content })
    });
    const data = await res.json();
    if (data.success) {
      toast(`✅ 發布成功！約 2 分鐘後可在 <a href="${data.url}" target="_blank" style="color:#4ade80">${data.filename}</a> 看到`, 8000);
      btn.innerHTML = '✅ 已發布'; btn.style.background = '#14532d';
      document.getElementById('dc-' + pageId)?.querySelector('.draft-term')?.insertAdjacentHTML('afterend',
        ' <span class="badge badge-green">📦 已上線</span>');
    } else {
      throw new Error(data.error || '未知錯誤');
    }
  } catch (e) {
    toast(`❌ 發布失敗：${e.message}`);
    btn.innerHTML = orig; btn.disabled = false;
  }
}

function esc(s) { return String(s||'').replace(/'/g,"\\'"); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 初始化
loadGaps();
</script>
</body>
</html>
